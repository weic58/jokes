<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>笑話大全</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2250%25%22 x=%2250%25%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2280%22>😂</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        .flipped .card-inner { transform: rotateY(180deg); }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .card-base { position: absolute; width: 100%; height: 100%; transition: all 0.3s ease-out; }
        .pos-left { transform: translateX(-110%) scale(0.85); filter: blur(4px); opacity: 0.5; cursor: pointer; }
        .pos-center { transform: translateX(0) scale(1); filter: blur(0); opacity: 1; z-index: 10; }
        .pos-right { transform: translateX(110%) scale(0.85); filter: blur(4px); opacity: 0.5; cursor: pointer; }
        .no-transition { transition: none !important; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans flex flex-col min-h-screen">

    <header class="bg-yellow-400 text-white p-4 shadow-md flex justify-between items-center z-10 sticky top-0 shrink-0 h-16">
        <h1 class="text-2xl font-bold cursor-pointer whitespace-nowrap" onclick="navigate('home')">😂 笑話大全</h1>
        
        <div class="flex items-center gap-3 relative">
            <div id="search-bar-container" class="absolute right-full mr-2 w-0 opacity-0 overflow-hidden transition-all duration-300 flex items-center bg-white rounded-full h-9 shadow-lg z-20">
                <input type="text" id="header-search-input" class="outline-none text-sm w-full text-gray-700 bg-transparent px-3" placeholder="搜尋問題或答案..." onkeydown="if(event.key==='Enter') executeSearch()">
                <button onclick="executeSearch()" class="text-gray-400 hover:text-yellow-500 text-sm mr-3 whitespace-nowrap">送出</button>
            </div>
            
            <button onclick="toggleSearch(event)" id="btn-toggle-search" class="hover:text-yellow-200 text-xl font-bold transition-all" title="搜尋">🔍</button>
            <button onclick="navigate('stats')" class="hover:text-yellow-200 text-xl" title="統計">📊</button>
            <button onclick="checkAdminAccess()" class="hover:text-yellow-200 text-xl" title="設定">⚙️</button>
            <button onclick="handleAuthClick()" id="nav-auth-btn" class="hover:text-yellow-200 text-xl" title="會員登入">👤</button>
        </div>
    </header>

    <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center z-50">
        <div class="bg-white p-6 rounded-xl shadow-lg w-80 relative">
            <button onclick="closeLoginModal()" class="absolute top-2 right-3 text-gray-400 hover:text-gray-600 text-xl font-bold">&times;</button>
            <h3 class="text-xl font-bold mb-4 text-gray-800 text-center">會員登入</h3>
            
            <button onclick="googleLogin()" class="w-full bg-white border border-gray-300 text-gray-700 font-bold py-2 rounded mb-4 hover:bg-gray-50 flex justify-center items-center gap-2 shadow-sm transition">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                使用 Google 帳號登入
            </button>

            <div class="relative flex py-2 items-center mb-4">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-xs">管理員專用</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <input type="email" id="admin-email" placeholder="管理員信箱" class="w-full border p-2 mb-3 rounded focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400">
            <input type="password" id="admin-pwd" placeholder="密碼" class="w-full border p-2 mb-4 rounded focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400" onkeydown="if(event.key==='Enter') adminLogin()">
            <button onclick="adminLogin()" class="w-full bg-gray-800 text-white font-bold py-2 rounded hover:bg-gray-900 transition shadow-sm">進入後台</button>
        </div>
    </div>

    <main class="flex-grow p-4 relative overflow-hidden flex flex-col items-center" id="main-content">
        
        <div id="view-home" class="view-section w-full max-w-3xl flex-grow flex-col gap-8 flex">
            <div class="w-full">
                <h3 class="text-xl font-bold text-gray-700 mb-4 flex items-center gap-2"><span class="text-2xl">✨</span> 特別企劃</h3>
                <div id="special-list" class="grid grid-cols-1 sm:grid-cols-3 gap-4"></div>
            </div>
            <div class="w-full">
                <h3 class="text-xl font-bold text-gray-700 mb-4 flex items-center gap-2">探索類別</h3>
                <div id="category-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>
            </div>
        </div>

        <div id="view-joke" class="view-section hidden w-full flex-grow flex-col items-center justify-start">
            <div class="w-full flex flex-col items-center pt-4 shrink-0">
                <h2 id="joke-category-title" class="text-lg font-bold text-gray-600 mb-4"></h2>
                <div class="flex gap-2 mb-2 bg-gray-200 p-1 rounded-full">
                    <button onclick="setJokeMode('flashcard')" id="btn-mode-flashcard" class="px-6 py-2 rounded-full font-bold transition-colors">單字卡</button>
                    <button onclick="setJokeMode('list')" id="btn-mode-list" class="px-6 py-2 rounded-full font-bold transition-colors">條列式</button>
                </div>
            </div>

            <div class="w-full flex-grow flex flex-col items-center justify-start pb-8 overflow-y-auto overflow-x-hidden">
                <div id="flashcard-container" class="w-full max-w-sm flex flex-col items-center mt-4" style="touch-action: pan-y;">
                    <div id="carousel-wrapper" class="relative w-full h-80 flex justify-center items-center">
                        <div id="card-left" class="card-base pos-left hidden" onclick="prevJoke()">
                            <div class="absolute inset-0 shadow-lg rounded-2xl bg-white border-2 border-gray-200 flex flex-col items-center justify-center p-6 text-gray-400">
                                <span class="text-xs font-bold absolute top-4 left-4">Q.</span>
                                <span id="joke-cat-left" class="absolute top-4 right-4 bg-gray-100 text-gray-400 px-2 py-1 rounded-full text-xs font-bold hidden"></span>
                                <p id="joke-q-left" class="text-lg font-semibold text-center"></p>
                                <span id="joke-source-left" class="absolute bottom-4 left-1/2 -translate-x-1/2 text-gray-300 text-[10px] hidden"></span>
                            </div>
                        </div>

                        <div id="flashcard" class="card-base pos-center cursor-pointer perspective-1000" onclick="toggleCard()">
                            <div class="card-inner relative w-full h-full transform-style-3d shadow-xl rounded-2xl">
                                <div class="absolute inset-0 backface-hidden bg-white rounded-2xl flex flex-col items-center justify-center p-6 border-4 border-yellow-400">
                                    <span class="text-sm text-yellow-500 font-bold absolute top-4 left-4">Q.</span>
                                    <span id="joke-cat-center" class="absolute top-4 right-4 bg-gray-100 text-gray-500 px-2 py-1 rounded-full text-xs font-bold hidden shadow-sm"></span>
                                    <p id="joke-question" class="text-xl font-semibold text-center"></p>
                                    <span id="joke-source-center" class="absolute bottom-4 left-1/2 -translate-x-1/2 text-gray-400 text-xs hidden whitespace-nowrap"></span>
                                    <span class="text-xs text-gray-400 absolute bottom-4 animate-pulse right-4">點擊翻面</span>
                                </div>
                                <div class="absolute inset-0 backface-hidden bg-yellow-400 rounded-2xl flex flex-col items-center justify-center p-6 rotate-y-180 text-white">
                                    <span class="text-sm text-yellow-100 font-bold absolute top-4 left-4">A.</span>
                                    <span id="joke-cat-center-back" class="absolute top-4 right-4 bg-yellow-500 text-yellow-100 px-2 py-1 rounded-full text-xs font-bold hidden shadow-sm"></span>
                                    <p id="joke-answer" class="text-2xl font-bold text-center"></p>
                                    <span id="joke-source-center-back" class="absolute bottom-4 left-1/2 -translate-x-1/2 text-yellow-200 text-xs hidden whitespace-nowrap"></span>
                                </div>
                            </div>
                        </div>

                        <div id="card-right" class="card-base pos-right hidden" onclick="nextJoke()">
                            <div class="absolute inset-0 shadow-lg rounded-2xl bg-white border-2 border-gray-200 flex flex-col items-center justify-center p-6 text-gray-400">
                                <span class="text-xs font-bold absolute top-4 left-4">Q.</span>
                                <span id="joke-cat-right" class="absolute top-4 right-4 bg-gray-100 text-gray-400 px-2 py-1 rounded-full text-xs font-bold hidden"></span>
                                <p id="joke-q-right" class="text-lg font-semibold text-center"></p>
                                <span id="joke-source-right" class="absolute bottom-4 left-1/2 -translate-x-1/2 text-gray-300 text-[10px] hidden"></span>
                            </div>
                        </div>
                    </div>

                    <div id="interaction-bar" class="flex justify-center gap-8 w-full mt-6 px-2 z-20">
                        <button onclick="toggleInteract('likes')" id="btn-like" class="flex items-center gap-1 text-gray-400 hover:text-blue-500 transition"><span class="text-2xl">👍</span> <span id="count-like" class="font-bold">0</span></button>
                        <button onclick="toggleInteract('dislikes')" id="btn-dislike" class="flex items-center gap-1 text-gray-400 hover:text-red-500 transition"><span class="text-2xl">👎</span> <span id="count-dislike" class="font-bold">0</span></button>
                        <button onclick="toggleInteract('favs')" id="btn-fav" class="flex items-center gap-1 text-gray-400 hover:text-pink-500 transition"><span class="text-2xl">❤️</span> <span id="count-fav" class="font-bold">0</span></button>
                    </div>

                    <div id="comments-section" class="w-full mt-6 bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                        <h4 class="font-bold text-gray-700 mb-3 border-b pb-2">留言區 (<span id="count-comment">0</span>)</h4>
                        <div id="comments-list" class="space-y-3 mb-4 max-h-40 overflow-y-auto text-sm pr-2"></div>
                        <div class="flex gap-2">
                            <input type="text" id="comment-input" placeholder="寫下你的評論..." class="flex-1 border p-2 rounded focus:outline-none focus:border-yellow-400 text-sm" onkeydown="if(event.key==='Enter') addComment()">
                            <button onclick="addComment()" class="bg-yellow-400 text-white px-4 py-2 rounded font-bold hover:bg-yellow-500 transition text-sm whitespace-nowrap">送出</button>
                        </div>
                    </div>
                </div>
                <div id="list-container" class="hidden w-full max-w-2xl flex-col gap-4 overflow-y-auto mt-4" style="max-height: 100%;"></div>
            </div>
        </div>

        <div id="view-admin" class="view-section hidden w-full max-w-5xl flex-grow">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold flex items-center">
                    後台管理 
                    <span id="sync-status-admin" class="text-sm font-normal text-red-500 ml-2">(Firebase 尚未設定)</span>
                </h2>
                <div class="flex gap-2">
                    <button onclick="forceSyncCloud()" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-2 rounded font-bold transition text-sm">強制覆蓋上傳雲端</button>
                    <button onclick="userLogout()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded font-bold transition text-sm">登出</button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow mb-6 border-l-4 border-purple-400">
                <h3 class="text-lg font-bold mb-2 text-purple-700">管理類別</h3>
                <div class="flex flex-col sm:flex-row gap-2">
                    <input type="text" id="add-new-category-input" placeholder="輸入新類別名稱..." class="border p-2 rounded flex-1 focus:outline-none focus:border-purple-400">
                    <button onclick="addNewCategory()" class="bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600 transition whitespace-nowrap">新增類別</button>
                </div>
                <div id="admin-category-list" class="mt-4 flex flex-wrap gap-2"></div>
            </div>
            
            <div class="bg-white p-4 rounded-xl shadow mb-6 border-l-4 border-green-400">
                <h3 class="text-lg font-bold mb-2 text-green-700">新增笑話</h3>
                <div class="flex flex-col md:flex-row gap-2 items-center w-full">
                    <select id="add-category-select" class="border p-2 rounded w-full md:w-1/6 focus:outline-none focus:border-green-400 bg-white"></select>
                    <input type="text" id="add-question" placeholder="問題" class="border p-2 rounded w-full md:flex-1 focus:outline-none focus:border-green-400">
                    <input type="text" id="add-answer" placeholder="答案" class="border p-2 rounded w-full md:flex-1 focus:outline-none focus:border-green-400">
                    <input type="text" id="add-source" placeholder="來源(選填)" class="border p-2 rounded w-full md:w-1/6 focus:outline-none focus:border-green-400 text-sm">
                    <button onclick="addJoke()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 transition whitespace-nowrap w-full md:w-auto">新增</button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow mb-6 border-l-4 border-blue-400">
                <h3 class="text-lg font-bold mb-2 text-blue-700">匯入 / 匯出 (CSV)</h3>
                <div class="flex flex-col sm:flex-row gap-2 items-start sm:items-center">
                    <input type="file" id="csv-file" accept=".csv" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                    <button onclick="importCSV()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition whitespace-nowrap mt-2 sm:mt-0">上傳匯入</button>
                    <button onclick="exportCSV()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 transition whitespace-nowrap mt-2 sm:mt-0 sm:ml-2">匯出 CSV</button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow overflow-x-auto">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-2 gap-2">
                    <h3 class="text-lg font-bold">現有笑話列表</h3>
                    <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                        <input type="text" id="admin-search-input" placeholder="搜尋內容或來源..." oninput="renderAdmin()" class="border p-1 rounded focus:outline-none focus:border-yellow-400 text-sm flex-1 sm:flex-none">
                        <select id="admin-sort-select" onchange="renderAdmin()" class="border p-1 rounded focus:outline-none focus:border-yellow-400 text-sm bg-gray-50">
                            <option value="newest">最新新增</option>
                            <option value="oldest">最舊新增</option>
                            <option value="most-likes">最多讚</option>
                            <option value="most-dislikes">最多倒讚</option>
                            <option value="most-favs">最多收藏</option>
                        </select>
                        <select id="admin-filter-category" onchange="renderAdmin()" class="border p-1 rounded focus:outline-none focus:border-yellow-400 text-sm bg-gray-50">
                            <option value="all">全部類別</option>
                        </select>
                    </div>
                </div>
                <table class="w-full text-left border-collapse min-w-[800px] text-sm mt-2">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="p-2 border font-semibold w-[15%]">類別</th>
                            <th class="p-2 border font-semibold w-[28%]">問題</th>
                            <th class="p-2 border font-semibold w-[28%]">答案</th>
                            <th class="p-2 border font-semibold w-[15%] text-center">來源</th>
                            <th class="p-2 border font-semibold text-center w-[14%]">操作</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
                <div class="mt-6 text-right">
                    <button onclick="clearAllData()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 text-sm transition">清除所有資料 (還原預設)</button>
                </div>
            </div>
        </div>

        <div id="view-stats" class="view-section hidden w-full max-w-5xl flex-grow">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">資料統計與紀錄</h2>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white p-4 rounded-xl shadow text-center cursor-pointer border-2 border-yellow-400 transition hover:bg-gray-50" onclick="showLeaderboard('total')" id="card-stat-total"><p class="text-gray-500 text-sm">總笑話數</p><p class="text-2xl font-bold text-gray-800" id="stat-total">0</p></div>
                <div class="bg-white p-4 rounded-xl shadow text-center cursor-pointer border-2 border-transparent transition hover:bg-blue-50" onclick="showLeaderboard('likes')" id="card-stat-likes"><p class="text-gray-500 text-sm">總獲讚數 👍</p><p class="text-2xl font-bold text-blue-500" id="stat-likes">0</p></div>
                <div class="bg-white p-4 rounded-xl shadow text-center cursor-pointer border-2 border-transparent transition hover:bg-pink-50" onclick="showLeaderboard('favs')" id="card-stat-favs"><p class="text-gray-500 text-sm">總收藏數 ❤️</p><p class="text-2xl font-bold text-pink-500" id="stat-favs">0</p></div>
                <div class="bg-white p-4 rounded-xl shadow text-center cursor-pointer border-2 border-transparent transition hover:bg-green-50" onclick="showLeaderboard('comments')" id="card-stat-comments"><p class="text-gray-500 text-sm">總評論數 💬</p><p class="text-2xl font-bold text-green-500" id="stat-comments">0</p></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-4 rounded-xl shadow flex flex-col items-center">
                    <h3 class="text-lg font-bold mb-2" id="leaderboard-title">各類別笑話數量分佈</h3>
                    <div class="w-full relative" style="height: 300px;"><canvas id="leaderboardChart"></canvas></div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow h-[360px] flex flex-col">
                    <h3 class="text-lg font-bold mb-4 border-b pb-2">系統更新紀錄</h3>
                    <ul id="update-logs" class="space-y-3 text-sm overflow-y-auto flex-grow pr-2"></ul>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-gray-800 text-gray-400 flex justify-center items-center gap-4 p-4 mt-auto text-sm shrink-0 z-20">
        <p>Created by weic58 & Gemini, 2026.</p>
        <span class="border-l border-gray-600 h-4"></span>
        <p>今日訪客數: <span id="visitor-count" class="font-bold text-white">載入中...</span></p>
    </footer>

    <script>
        // ==========================================
        // Firebase 設定與權限 
        // ==========================================
        const firebaseConfig = {
          apiKey: "AIzaSyBlJThehQdczOSDrLHKTE126iWnzsdmkKQ",
          authDomain: "jokes-11086.firebaseapp.com",
          databaseURL: "https://jokes-11086-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "jokes-11086",
          storageBucket: "jokes-11086.firebasestorage.app",
          messagingSenderId: "359796489930",
          appId: "1:359796489930:web:ce2fb85ec9d3c5ffd33e33",
          measurementId: "G-Q3S9BH55RG"
        };
        
        // 請將此處改為你在後台建立的唯一「管理員信箱」
        const ADMIN_EMAIL = "chenwei.c0508@gmail.com";

        let db = null; let auth = null;
        const useFirebase = firebaseConfig.apiKey !== "";
        let isAdmin = false; 

        const d = new Date();
        const todayStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

        if (useFirebase) {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database(); auth = firebase.auth();
            const visitorRef = db.ref('dailyVisitors/' + todayStr);
            
            auth.onAuthStateChanged(user => {
                const navBtn = document.getElementById('nav-auth-btn');
                const statusAdmin = document.getElementById('sync-status-admin');

                if(user) {
                    isAdmin = (user.email === ADMIN_EMAIL); 
                    navBtn.innerText = '登出'; navBtn.title = user.displayName || user.email;
                    if (isAdmin) {
                        statusAdmin.innerText = "(管理員已登入 🟢)"; statusAdmin.className = "text-sm font-normal text-green-500 ml-2";
                    } else {
                        statusAdmin.innerText = "(一般會員登入中 🟡)"; statusAdmin.className = "text-sm font-normal text-yellow-500 ml-2";
                    }
                } else {
                    isAdmin = false;
                    navBtn.innerText = '👤'; navBtn.title = '會員登入';
                    statusAdmin.innerText = "(訪客模式 🔴)"; statusAdmin.className = "text-sm font-normal text-red-500 ml-2";
                    if(!document.getElementById('view-admin').classList.contains('hidden')) navigate('home');
                    if (localStorage.getItem('visited_date') !== todayStr) {
                        visitorRef.transaction(current => (current || 0) + 1, (error, committed) => {

        // 4. 改寫比對邏輯，回傳重複項目的 Index 以便後續覆蓋
        function findDuplicateIndex(q, a) {
            const normQ = normalizeText(q); const normA = normalizeText(a);
            if (!normQ || !normA) return -1;
            return jokes.findIndex(j => {
                const jq = normalizeText(j.question); const ja = normalizeText(j.answer);
                return (jq.includes(normQ) || normQ.includes(jq)) && (ja.includes(normA) || normA.includes(ja));

        function renderAdmin() {
            if (!isAdmin && useFirebase) { navigate('home'); return; } 
            const categoryListContainer = document.getElementById('admin-category-list'); categoryListContainer.innerHTML = '';
            categories.forEach((cat, index) => {
                const badge = document.createElement('div'); badge.className = "flex items-center bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-sm shadow-sm border border-purple-200";
                badge.innerHTML = `<span contenteditable="true" onblur="updateCategoryName(${index}, this)" class="outline-none focus:bg-white focus:ring-2 focus:ring-purple-300 px-1 rounded cursor-text truncate max-w-[150px]">${cat}</span><button onclick="deleteCategory(${index})" class="ml-2 text-purple-400 hover:text-red-500 font-bold leading-none text-lg transition-colors">&times;</button>`;
                categoryListContainer.appendChild(badge);
            });

            const selectEl = document.getElementById('add-category-select'); selectEl.innerHTML = '<option value="" disabled selected>請選擇類別...</option>';
            categories.forEach(cat => { const opt = document.createElement('option'); opt.value = cat; opt.innerText = cat; selectEl.appendChild(opt); });

            const filterEl = document.getElementById('admin-filter-category'); const currentFilter = filterEl ? filterEl.value : 'all';
            if(filterEl) {
                filterEl.innerHTML = '<option value="all">顯示全部類別</option>';
                categories.forEach(cat => { const opt = document.createElement('option'); opt.value = cat; opt.innerText = cat; if(cat === currentFilter) opt.selected = true; filterEl.appendChild(opt); });
            }

            const searchVal = document.getElementById('admin-search-input') ? document.getElementById('admin-search-input').value.toLowerCase() : '';
            const sortVal = document.getElementById('admin-sort-select') ? document.getElementById('admin-sort-select').value : 'newest';
            let mappedJokes = jokes.map((j, idx) => ({ ...j, originalIndex: idx }));

            if (currentFilter !== 'all') mappedJokes = mappedJokes.filter(j => j.category === currentFilter);
            if (searchVal) mappedJokes = mappedJokes.filter(j => j.question.toLowerCase().includes(searchVal) || j.answer.toLowerCase().includes(searchVal) || (j.source && j.source.toLowerCase().includes(searchVal)));

            if (sortVal === 'newest') mappedJokes.sort((a, b) => b.id - a.id);
            else if (sortVal === 'oldest') mappedJokes.sort((a, b) => a.id - b.id);
            else if (sortVal === 'most-likes') mappedJokes.sort((a, b) => (b.likes ? Object.keys(b.likes).length : 0) - (a.likes ? Object.keys(a.likes).length : 0));
            else if (sortVal === 'most-dislikes') mappedJokes.sort((a, b) => (b.dislikes ? Object.keys(b.dislikes).length : 0) - (a.dislikes ? Object.keys(a.dislikes).length : 0));
            else if (sortVal === 'most-favs') mappedJokes.sort((a, b) => (b.favs ? Object.keys(b.favs).length : 0) - (a.favs ? Object.keys(a.favs).length : 0));

            const tbody = document.getElementById('admin-table-body'); tbody.innerHTML = '';
            mappedJokes.forEach(j => {
                const origIdx = j.originalIndex; const catOptions = categories.map(c => `<option value="${c}" ${c === j.category ? 'selected' : ''}>${c}</option>`).join('');
                const lc = j.likes ? Object.keys(j.likes).length : 0; const dc = j.dislikes ? Object.keys(j.dislikes).length : 0; const fc = j.favs ? Object.keys(j.favs).length : 0;
                const sourceText = j.source || '';
                
                const tr = document.createElement('tr'); tr.className = "border-b hover:bg-gray-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-2 border text-gray-700">
                        <select onchange="updateJokeCategory(${origIdx}, this)" class="w-full bg-transparent outline-none focus:ring-2 focus:ring-yellow-300 rounded p-1 cursor-pointer border border-gray-200 hover:bg-white mb-1">${catOptions}</select>
                        <div class="text-[10px] text-gray-400 mt-1 flex gap-2"><span>👍 ${lc}</span><span>👎 ${dc}</span><span>❤️ ${fc}</span></div>
                    </td>
                    <td class="p-2 border font-medium outline-none focus:bg-yellow-50 focus:ring-2 focus:ring-yellow-300 cursor-text transition-colors rounded-sm" contenteditable="true" onblur="updateJokeInline(${origIdx}, 'question', this)">${j.question}</td>
                    <td class="p-2 border text-gray-600 outline-none focus:bg-yellow-50 focus:ring-2 focus:ring-yellow-300 cursor-text transition-colors rounded-sm" contenteditable="true" onblur="updateJokeInline(${origIdx}, 'answer', this)">${j.answer}</td>
                    <td class="p-2 border text-gray-500 text-center outline-none focus:bg-yellow-50 focus:ring-2 focus:ring-yellow-300 cursor-text transition-colors rounded-sm text-xs" contenteditable="true" onblur="updateJokeInline(${origIdx}, 'source', this)">${sourceText}</td>
                    <td class="p-2 border text-center whitespace-nowrap"><button onclick="deleteJoke(${origIdx})" class="text-red-500 hover:text-red-700 font-bold bg-red-50 hover:bg-red-100 px-3 py-1 rounded transition">刪除</button></td>`;
                tbody.appendChild(tr);
            });
        }

        function updateJokeCategory(index, element) { const newCat = element.value; if (jokes[index].category !== newCat) { jokes[index].category = newCat; saveData(); renderAdmin(); } }
        function updateCategoryName(index, element) {
            const newName = element.innerText.trim(); const oldName = categories[index]; if (!newName) { element.innerText = oldName; return; }
            if (newName !== oldName) {
                if (categories.includes(newName) && categories.indexOf(newName) !== index) { alert("此類別名稱已存在！"); element.innerText = oldName; return; }
                categories[index] = newName; let affectedJokes = 0;
                jokes.forEach(j => { if (j.category === oldName) { j.category = newName; affectedJokes++; } });
                if (affectedJokes > 0) addLog(`將類別「${oldName}」重新命名為「${newName}」。`); saveData(); renderAdmin();
            }
        }
        function deleteCategory(index) {
            const catName = categories[index]; const jokesInCat = jokes.filter(j => j.category === catName).length;
            if (jokesInCat > 0 && !confirm(`「${catName}」底下還有 ${jokesInCat} 則笑話。確定要移除標籤嗎？`)) return;
            if (jokesInCat === 0 && !confirm(`確定要刪除「${catName}」嗎？`)) return;
            categories.splice(index, 1); addLog(`移除了類別：「${catName}」。`); saveData(); renderAdmin();
        }
        function addNewCategory() {
            const newCat = document.getElementById('add-new-category-input').value.trim();
            if (!newCat) return; if (categories.includes(newCat)) { alert("這個類別已經存在囉！"); return; }
            categories.push(newCat); addLog(`新增了類別：「${newCat}」。`); saveData(); document.getElementById('add-new-category-input').value = ''; renderAdmin();
        }
        
        // 4. 單筆新增檢查覆蓋
        function addJoke() {
            const category = document.getElementById('add-category-select').value; const question = document.getElementById('add-question').value.trim();
            const answer = document.getElementById('add-answer').value.trim(); const source = document.getElementById('add-source').value.trim();
            if (!category || !question || !answer) { alert("請填寫分類、問題與答案！"); return; }
            
            let dupIdx = findDuplicateIndex(question, answer);
            if (dupIdx !== -1) { 
                if(confirm("這則笑話似乎已經存在囉！要直接覆蓋更新它嗎？")) {
                    jokes[dupIdx].category = category;
                    jokes[dupIdx].question = question;
                    jokes[dupIdx].answer = answer;
                    jokes[dupIdx].source = source;
                    addLog(`覆蓋更新一則「${category}」笑話。`);
                    saveData();
                    document.getElementById('add-question').value = ''; document.getElementById('add-answer').value = ''; document.getElementById('add-source').value = ''; renderAdmin();
                }
                return; 
            }
            
            jokes.push({ id: Date.now(), category, question, answer, source }); addLog(`新增一則「${category}」笑話。`); saveData();
            document.getElementById('add-question').value = ''; document.getElementById('add-answer').value = ''; document.getElementById('add-source').value = ''; renderAdmin();
        }
        function updateJokeInline(index, field, element) {
            const newValue = element.innerText.trim(); const oldValue = jokes[index][field] || '';
            if (!newValue && field !== 'source') { element.innerText = oldValue; return; }
            if (newValue !== oldValue) {
                jokes[index][field] = newValue;
                if (field === 'category' && !categories.includes(newValue)) { categories.push(newValue); addLog(`新增了新類別：「${newValue}」。`); }
                saveData(); renderAdmin(); 
            }
        }
        function deleteJoke(index) { if (confirm("確定刪除這則笑話嗎？")) { jokes.splice(index, 1); addLog(`刪除一則笑話。`); saveData(); renderAdmin(); } }
        function clearAllData() { if(confirm("警告：這將會清除所有資料！確定嗎？")) { jokes = [...defaultJokes]; categories = [...new Set(defaultJokes.map(j => j.category))]; updateLogs = [{ time: new Date().toLocaleString(), msg: "系統重置。" }]; saveData(); renderAdmin(); } }

        // 4. 批量匯入檢查覆蓋
        function importCSV() {
            const fileInput = document.getElementById('csv-file'); const file = fileInput.files[0]; if (!file) { alert("請先選擇 CSV 檔案。"); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result; const rows = text.split('\n'); 
                let addedCount = 0; let updatedCount = 0; let skippedCount = 0; let addedCategories = new Set();
                const re = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                
                let duplicates = []; let newJokes = [];
                
                rows.forEach(row => {
                    const cols = row.split(re).map(s => s.replace(/(^"|"$)/g, '').replace(/""/g, '"').trim());
                    if (cols.length >= 3) {
                        const cat = cols[0], q = cols[1], a = cols[2]; const source = cols[3] !== undefined ? cols[3] : '';
                        if (cat && q && a) {
                            let dupIdx = findDuplicateIndex(q, a);
                            if (dupIdx !== -1) duplicates.push({ idx: dupIdx, cat, q, a, source });
                            else newJokes.push({ cat, q, a, source });
                        }
                    }
                });

                if (duplicates.length > 0) {
                    let overwrite = confirm(`匯入的資料中發現 ${duplicates.length} 則重複笑話，是否要覆蓋原本的資料？\n(按「確定」將覆蓋更新，「取消」則略過重複項目)`);
                    if (overwrite) {
                        duplicates.forEach(d => {
                            jokes[d.idx].category = d.cat; jokes[d.idx].question = d.q; jokes[d.idx].answer = d.a; jokes[d.idx].source = d.source;
                            updatedCount++;
                        });
                    } else {
                        skippedCount = duplicates.length;
                    }
                }

                newJokes.forEach(n => {
                    jokes.push({ id: Date.now() + Math.random(), category: n.cat, question: n.q, answer: n.a, source: n.source });
                    if (!categories.includes(n.cat)) categories.push(n.cat); addedCount++;
                });

                if (addedCount > 0 || updatedCount > 0) { 
                    addLog(`透過 CSV 新增了 ${addedCount} 則，覆蓋更新了 ${updatedCount} 則笑話。`); saveData(); renderAdmin(); 
                    alert(`匯入完成！\n新增：${addedCount} 則\n更新：${updatedCount} 則\n略過：${skippedCount} 則`); 
                } else if (skippedCount > 0) { 
                    alert(`匯入完成！但 ${skippedCount} 則皆已重複，無新增任何資料。`); 
                } else { alert("匯入失敗，請檢查格式。"); }
                
                fileInput.value = ""; 
            }; reader.readAsText(file);
        }

        function exportCSV() {
            let csvContent = "\uFEFF"; csvContent += "類別,問題,答案,來源\n";
            jokes.forEach(j => {
                const escapeCSV = str => `"${String(str || '').replace(/"/g, '""')}"`; csvContent += `${escapeCSV(j.category)},${escapeCSV(j.question)},${escapeCSV(j.answer)},${escapeCSV(j.source || '')}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(blob);
            const link = document.createElement("a"); link.setAttribute("href", url); link.setAttribute("download", "jokes_export.csv"); document.body.appendChild(link); link.click(); document.body.removeChild(link); addLog("匯出 CSV。");
        }

        function renderStats() {
            let totalLikes = 0, totalFavs = 0, totalComments = 0;
            jokes.forEach(j => { 
                if (j.likes) totalLikes += Object.keys(j.likes).length;
                if (j.favs) totalFavs += Object.keys(j.favs).length;
                if (j.comments) totalComments += j.comments.length;
            });

            document.getElementById('stat-total').innerText = jokes.length;
            document.getElementById('stat-likes').innerText = totalLikes;
            document.getElementById('stat-favs').innerText = totalFavs;
            document.getElementById('stat-comments').innerText = totalComments;

            showLeaderboard('total');

            const logsUl = document.getElementById('update-logs'); logsUl.innerHTML = '';
            updateLogs.forEach(log => {
                const li = document.createElement('li'); li.className = "border-b border-gray-100 pb-2 last:border-0";
                li.innerHTML = `<span class="text-gray-400 block text-xs mb-0.5">${log.time}</span> <span class="text-gray-700">${log.msg}</span>`;
                logsUl.appendChild(li);
            });
        }

        function showLeaderboard(type) {
            ['total', 'likes', 'favs', 'comments'].forEach(t => {
                document.getElementById(`card-stat-${t}`).classList.remove('border-yellow-400', 'bg-yellow-50');
                document.getElementById(`card-stat-${t}`).classList.add('border-transparent');
            });
            document.getElementById(`card-stat-${type}`).classList.remove('border-transparent');
            document.getElementById(`card-stat-${type}`).classList.add('border-yellow-400', 'bg-yellow-50');

            const ctx = document.getElementById('leaderboardChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            let labels = []; let data = []; let labelName = ''; let bgColor = ''; let title = '';

            if (type === 'total') {
                title = '各類別笑話數量分佈'; labelName = '笑話數量'; bgColor = 'rgba(250, 204, 21, 0.6)';
                const counts = {}; categories.forEach(c => counts[c] = 0); 
                jokes.forEach(j => { counts[j.category] = (counts[j.category] || 0) + 1; });
                labels = Object.keys(counts); data = Object.values(counts);
            } else {
                let sortedJokes = [...jokes];
                if (type === 'likes') { title = '👍 最多讚排行榜 (Top 5)'; labelName = '獲讚數'; bgColor = 'rgba(59, 130, 246, 0.6)'; sortedJokes.sort((a,b) => (b.likes ? Object.keys(b.likes).length : 0) - (a.likes ? Object.keys(a.likes).length : 0)); }
                else if (type === 'favs') { title = '❤️ 最多收藏排行榜 (Top 5)'; labelName = '收藏數'; bgColor = 'rgba(236, 72, 153, 0.6)'; sortedJokes.sort((a,b) => (b.favs ? Object.keys(b.favs).length : 0) - (a.favs ? Object.keys(a.favs).length : 0)); }
                else if (type === 'comments') { title = '💬 最多評論排行榜 (Top 5)'; labelName = '評論數'; bgColor = 'rgba(34, 197, 94, 0.6)'; sortedJokes.sort((a,b) => (b.comments ? b.comments.length : 0) - (a.comments ? a.comments.length : 0)); }

                const top5 = sortedJokes.slice(0, 5).filter(j => {
                    if (type === 'likes') return j.likes && Object.keys(j.likes).length > 0;
                    if (type === 'favs') return j.favs && Object.keys(j.favs).length > 0;
                    if (type === 'comments') return j.comments && j.comments.length > 0;
                });

                if (top5.length === 0) { labels = ['(目前尚無數據)']; data = [0]; } 
                else {
                    labels = top5.map(j => j.question.length > 10 ? j.question.substring(0, 10) + '...' : j.question);
                    data = top5.map(j => {
                        if(type==='likes') return Object.keys(j.likes).length;
                        if(type==='favs') return Object.keys(j.favs).length;
                        return j.comments.length;
                    });
                }
            }

            document.getElementById('leaderboard-title').innerText = title;
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: labelName, data: data, backgroundColor: bgColor, borderRadius: 4 }] },
                options: {
                    indexAxis: type === 'total' ? 'x' : 'y', 
                    responsive: true, maintainAspectRatio: false, 
                    scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } }, y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }
    </script>
</body>
